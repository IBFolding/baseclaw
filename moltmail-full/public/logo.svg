<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <!-- Electric blue to purple gradient -->
    <linearGradient id="mainGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00f0ff;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#0080ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff00ff;stop-opacity:1" />
    </linearGradient>
    <!-- Glow filter -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Background circle -->
  <circle cx="50" cy="50" r="46" fill="none" stroke="url(#mainGrad)" stroke-width="2" filter="url(#glow)" opacity="0.9"/>
  <!-- Inner hexagon frame -->
  <polygon points="50,12 85,28 85,72 50,88 15,72 15,28" fill="none" stroke="url(#mainGrad)" stroke-width="1.5" opacity="0.5"/>
  <!-- M-shaped envelope - stylized -->
  <g transform="translate(50,50)" filter="url(#glow)">
    <!-- Envelope body outline -->
    <path d="M-28,-20 L0,0 L28,-20 L28,20 L-28,20 Z" fill="rgba(0,20,40,0.8)" stroke="url(#mainGrad)" stroke-width="2.5"/>
    <!-- Envelope flap V shape -->
    <path d="M-28,-20 L0,5 L28,-20" fill="none" stroke="#00f0ff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Circuit/M tech lines -->
    <path d="M-20,-8 L-12,8 L0,-8 L12,8 L20,-8" fill="none" stroke="#ff00ff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Small connection dots -->
    <circle cx="-20" cy="-8" r="2" fill="#00f0ff"/>
    <circle cx="-12" cy="8" r="2" fill="#00f0ff"/>
    <circle cx="0" cy="-8" r="2" fill="#ff00ff"/>
    <circle cx="12" cy="8" r="2" fill="#ff00ff"/>
    <circle cx="20" cy="-8" r="2" fill="#00f0ff"/>
  </g>
  <!-- Corner accent dots -->
  <circle cx="50" cy="8" r="2" fill="#00f0ff" filter="url(#glow)"/>
  <circle cx="50" cy="92" r="2" fill="#ff00ff" filter="url(#glow)"/>
  <circle cx="8" cy="50" r="2" fill="#ff00ff" filter="url(#glow)"/>
  <circle cx="92" cy="50" r="2" fill="#00f0ff" filter="url(#glow)"/>
</svg>
